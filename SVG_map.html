<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>台灣22縣市旅遊經驗地圖 - 多用戶版</title>
    <style>/* 原有樣式保持不變 */</style>
</head>
<body>
    <div class="container">
        <h1>🇹🇼 多人台灣旅遊地圖</h1>
        <input type="text" id="nickname" placeholder="輸入暱稱（如：小明）" style="font-size:24px;padding:15px;width:300px;">
        <button onclick="loadUserData()">查詢地圖</button>
        <div id="status" style="margin:20px;color:#666;"></div>
       <svg id="map" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid meet" style="width:100%;height:600px;border:2px solid #eee;border-radius:10px;">
    <!-- 真實台灣22縣市地圖（公共領域） -->
    <path id="KEELUNG" class="county" d="M205 85 L225 78 L238 95 L232 110 L220 105 L205 92Z" stroke="#333" stroke-width="1.5" fill="#999"/>
    <path id="TAIPEI" class="county" d="M238 95 L260 90 L275 112 L265 125 L245 118 L238 105Z" stroke="#333" stroke-width="1.5" fill="#999"/>
    <path id="NEW_TAIPEI" class="county" d="M225 105 L245 135 L235 170 L210 155 L205 130Z" stroke="#333" stroke-width="1.5" fill="#999"/>
    <path id="TAOYUAN" class="county" d="M245 135 L265 145 L285 170 L270 185 L250 165Z" stroke="#333" stroke-width="1.5" fill="#999"/>
    <path id="HSINCHU_CITY" class="county" d="M285 170 L300 165 L310 190 L295 200Z" stroke="#333" stroke-width="1.5" fill="#999"/>
    <path id="HSINCHU_COUNTY" class="county" d="M295 200 L315 205 L325 235 L310 225Z" stroke="#333" stroke-width="1.5" fill="#999"/>
    <path id="MIAOLI" class="county" d="M310 225 L330 235 L340 270 L325 260Z" stroke="#333" stroke-width="1.5" fill="#999"/>
    <path id="TAICHUNG" class="county" d="M325 260 L345 270 L365 300 L350 310 L335 290Z" stroke="#333" stroke-width="1.5" fill="#999"/>
    <path id="CHANGHUA" class="county" d="M350 310 L370 320 L390 350 L375 360Z" stroke="#333" stroke-width="1.5" fill="#999"/>
    <path id="NANTou" class="county" d="M335 290 L350 330 L355 370 L340 350Z" stroke="#333" stroke-width="1.5" fill="#999"/>
    <path id="YUNLIN" class="county" d="M375 360 L395 370 L415 400 L400 410Z" stroke="#333" stroke-width="1.5" fill="#999"/>
    <path id="CHIAYI_CITY" class="county" d="M400 410 L420 420 L430 450 L415 460Z" stroke="#333" stroke-width="1.5" fill="#999"/>
    <path id="CHIAYI_COUNTY" class="county" d="M415 460 L435 470 L455 500 L440 510Z" stroke="#333" stroke-width="1.5" fill="#999"/>
    <path id="Tainan" class="county" d="M430 450 L455 460 L475 490 L455 500Z" stroke="#333" stroke-width="1.5" fill="#999"/>
    <path id="KAOHSIUNG" class="county" d="M455 500 L475 510 L495 540 L480 550 L465 530Z" stroke="#333" stroke-width="1.5" fill="#999"/>
    <path id="PINGTUNG" class="county" d="M480 550 L500 560 L520 590 L505 600Z" stroke="#333" stroke-width="1.5" fill="#999"/>
    <!-- 東部 -->
    <path id="YILAN" class="county" d="M185 85 L205 92 L195 105 L185 95Z" stroke="#333" stroke-width="1.5" fill="#999"/>
    <path id="HUALIEN" class="county" d="M310 185 L330 195 L345 225 L330 215Z" stroke="#333" stroke-width="1.5" fill="#999"/>
    <path id="TAITUNG" class="county" d="M345 225 L365 255 L385 285 L370 275Z" stroke="#333" stroke-width="1.5" fill="#999"/>
    <!-- 離島 -->
    <path id="KINMEN" class="county" d="M620 420 L640 430 L650 455 L635 445Z" stroke="#333" stroke-width="1.5" fill="#999"/>
    <path id="PENGHU" class="county" d="M510 480 L530 490 L540 510 L525 500Z" stroke="#333" stroke-width="1.5" fill="#999"/>
    <path id="LIANCHIANG" class="county" d="M650 455 L670 465 L680 485 L665 475Z" stroke="#333" stroke-width="1.5" fill="#999"/>
</svg>
        <div class="legend">...原有傳奇...</div>
    </div>

    <script>
        // 你的22縣市ID順序
        const counties = ['KEELUNG','TAIPEI','NEW_TAIPEI','TAOYUAN','HSINCHU_CITY','HSINCHU_COUNTY','MIAOLI','TAICHUNG','CHANGHUA','NANTou','YUNLIN','CHIAYI_CITY','CHIAYI_COUNTY','Tainan','KAOHSIUNG','PINGTUNG','YILAN','HUALIEN','TAITUNG','KINMEN','PENGHU','LIANCHIANG'];
        const colors = ['#999','#4CAF50','#FFEB3B','#FF9800','#F44336'];
        const SHEET_ID = '2PAX-1vS9gDqT8-TW0672mCJe2PAXKv17kLuccRNpfuyJAYGnfWYHegut4Miq3QkZv47sk'; // 從連結複製
        
        async function loadUserData() {
            const nickname = document.getElementById('nickname').value.trim();
            if (!nickname) {
                document.getElementById('status').innerHTML = '⚠️ 請輸入暱稱';
                return;
            }
            
            document.getElementById('status').innerHTML = '🔄 載入中...';
            
            try {
                // Google Sheets CSV → JSON (CORS解決)
                const csvUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/pub?output=csv`;
                const csvData = await fetch(csvUrl).then(r => r.text());
                
                // 解析CSV找暱稱對應的22碼
                const rows = csvData.split('\n').map(row => {
                    const [name, sequence] = row.split(',');
                    return {name: name.trim(), sequence: sequence.trim()};
                }).filter(row => row.name && row.sequence);
                
                const user = rows.find(row => row.name.toLowerCase() === nickname.toLowerCase());
                
                if (user && user.sequence.length === 22) {
                    document.getElementById('status').innerHTML = `✅ 找到 ${nickname} 的旅遊記錄 (${user.sequence.split('0').length-1}城市已去過)`;
                    updateMap(user.sequence);
                } else {
                    document.getElementById('status').innerHTML = `❌ 未找到 "${nickname}" 或資料格式錯誤`;
                }
            } catch (error) {
                document.getElementById('status').innerHTML = '❌ 網路錯誤，請確認Sheets已公開';
                console.error(error);
            }
        }
        
        function updateMap(seq) {
            counties.forEach((id, i) => {
                const county = document.getElementById(id);
                if (county) {
                    const visits = parseInt(seq[i]) || 0;
                    county.style.fill = colors[visits];
                    county.title = `${getCountyName(i)}: ${visits}次`;
                }
            });
        }
        
        function getCountyName(i) {
            const names = ['基隆','台北','新北','桃園','新竹市','新竹縣','苗栗','台中','彰化','南投','雲林','嘉義市','嘉義縣','台南','高雄','屏東','宜蘭','花蓮','台東','金門','澎湖','連江'];
            return names[i];
        }
        
        // Enter鍵觸發
        document.getElementById('nickname').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loadUserData();
        });
    </script>
</body>
</html>
