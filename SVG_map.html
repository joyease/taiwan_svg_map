<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>台灣22縣市旅遊經驗地圖 - 多用戶版</title>
    <style>/* 原有樣式保持不變 */</style>
</head>
<body>
    <div class="container">
        <h1>🇹🇼 多人台灣旅遊地圖</h1>
        <input type="text" id="nickname" placeholder="輸入暱稱（如：小明）" style="font-size:24px;padding:15px;width:300px;">
        <button onclick="loadUserData()">查詢地圖</button>
        <div id="status" style="margin:20px;color:#666;"></div>
       <svg id="map" viewBox="0 0 1000 1400" preserveAspectRatio="xMidYMid meet" style="width:100%;height:650px;">
    <!-- 高精度台灣22縣市行政區 -->
    <defs><style>.county{transition:fill 0.3s;stroke:#555;stroke-width:1.5;cursor:pointer;}.county:hover{stroke-width:3;opacity:0.9;}</style></defs>
    
    <!-- 北部 -->
    <path id="KEELUNG" class="county" d="M 280 120 L 305 110 L 320 135 L 310 155 L 295 145 Z" fill="#999"/>
    <path id="TAIPEI" class="county" d="M 320 135 L 350 130 L 365 165 L 345 175 L 320 155 Z" fill="#999"/>
    <path id="NEW_TAIPEI" class="county" d="M 295 155 L 320 195 L 300 235 L 275 215 Z" fill="#999"/>
    <path id="TAOYUAN" class="county" d="M 320 195 L 350 205 L 370 235 L 345 245 L 325 225 Z" fill="#999"/>
    <path id="HSINCHU_CITY" class="county" d="M 370 235 L 385 230 L 395 260 L 380 270 Z" fill="#999"/>
    <path id="HSINCHU_COUNTY" class="county" d="M 380 270 L 405 280 L 415 310 L 400 300 Z" fill="#999"/>
    
    <!-- 中部 -->
    <path id="MIAOLI" class="county" d="M 400 300 L 425 310 L 435 345 L 420 335 Z" fill="#999"/>
    <path id="TAICHUNG" class="county" d="M 420 335 L 450 345 L 470 375 L 455 385 L 435 365 Z" fill="#999"/>
    <path id="CHANGHUA" class="county" d="M 455 385 L 480 395 L 500 425 L 485 435 Z" fill="#999"/>
    <path id="NANTou" class="county" d="M 435 365 L 455 405 L 465 445 L 450 435 Z" fill="#999"/>
    <path id="YUNLIN" class="county" d="M 485 435 L 510 445 L 530 475 L 515 485 Z" fill="#999"/>
    
    <!-- 南部 -->
    <path id="CHIAYI_CITY" class="county" d="M 515 485 L 535 495 L 545 525 L 530 535 Z" fill="#999"/>
    <path id="CHIAYI_COUNTY" class="county" d="M 530 535 L 555 545 L 575 575 L 560 585 Z" fill="#999"/>
    <path id="Tainan" class="county" d="M 545 525 L 575 535 L 595 565 L 575 575 Z" fill="#999"/>
    <path id="KAOHSIUNG" class="county" d="M 575 575 L 605 585 L 625 615 L 610 625 L 590 605 Z" fill="#999"/>
    <path id="PINGTUNG" class="county" d="M 610 625 L 640 635 L 660 665 L 645 675 Z" fill="#999"/>
    
    <!-- 東部 -->
    <path id="YILAN" class="county" d="M 240 120 L 280 135 L 260 145 Z" fill="#999"/>
    <path id="HUALIEN" class="county" d="M 385 230 L 415 240 L 430 280 L 410 270 Z" fill="#999"/>
    <path id="TAITUNG" class="county" d="M 430 280 L 460 310 L 480 340 L 465 330 Z" fill="#999"/>
    
    <!-- 離島（縮小顯示） -->
    <path id="KINMEN" class="county" d="M 720 480 L 740 490 L 750 515 L 735 505 Z" fill="#999"/>
    <path id="PENGHU" class="county" d="M 590 540 L 610 550 L 620 570 L 605 560 Z" fill="#999"/>
    <path id="LIANCHIANG" class="county" d="M 750 515 L 770 525 L 780 545 L 765 535 Z" fill="#999"/>
</svg>
        <div class="legend">...原有傳奇...</div>
    </div>

    <script>
        // 你的22縣市ID順序
        const counties = ['KEELUNG','TAIPEI','NEW_TAIPEI','TAOYUAN','HSINCHU_CITY','HSINCHU_COUNTY','MIAOLI','TAICHUNG','CHANGHUA','NANTou','YUNLIN','CHIAYI_CITY','CHIAYI_COUNTY','Tainan','KAOHSIUNG','PINGTUNG','YILAN','HUALIEN','TAITUNG','KINMEN','PENGHU','LIANCHIANG'];
        const colors = ['#999','#4CAF50','#FFEB3B','#FF9800','#F44336'];
        const SHEET_ID = '2PACX-1vSwr9gxiDqT8-tTs_WO6772myCOj-LJccRnHPqIfyuyJAYGYQnfwYHHegut64M3aiq3BqKzvh147skT'; // 從連結複製
        
        async function loadUserData() {
            const nickname = document.getElementById('nickname').value.trim();
            if (!nickname) {
                document.getElementById('status').innerHTML = '⚠️ 請輸入暱稱';
                return;
            }
            
            document.getElementById('status').innerHTML = '🔄 載入中...';
            
            try {
                // Google Sheets CSV → JSON (CORS解決)
                const csvUrl = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/pub?output=csv`;
                const csvData = await fetch(csvUrl).then(r => r.text());
                
                // 解析CSV找暱稱對應的22碼
                const rows = csvData.split('\n').map(row => {
                    const [name, sequence] = row.split(',');
                    return {name: name.trim(), sequence: sequence.trim()};
                }).filter(row => row.name && row.sequence);
                
                const user = rows.find(row => row.name.toLowerCase() === nickname.toLowerCase());
                
                if (user && user.sequence.length === 22) {
                    document.getElementById('status').innerHTML = `✅ 找到 ${nickname} 的旅遊記錄 (${user.sequence.split('0').length-1}城市已去過)`;
                    updateMap(user.sequence);
                } else {
                    document.getElementById('status').innerHTML = `❌ 未找到 "${nickname}" 或資料格式錯誤`;
                }
            } catch (error) {
                document.getElementById('status').innerHTML = '❌ 網路錯誤，請確認Sheets已公開';
                console.error(error);
            }
        }
        
        function updateMap(seq) {
            counties.forEach((id, i) => {
                const county = document.getElementById(id);
                if (county) {
                    const visits = parseInt(seq[i]) || 0;
                    county.style.fill = colors[visits];
                    county.title = `${getCountyName(i)}: ${visits}次`;
                }
            });
        }
        
        function getCountyName(i) {
            const names = ['基隆','台北','新北','桃園','新竹市','新竹縣','苗栗','台中','彰化','南投','雲林','嘉義市','嘉義縣','台南','高雄','屏東','宜蘭','花蓮','台東','金門','澎湖','連江'];
            return names[i];
        }
        
        // Enter鍵觸發
        document.getElementById('nickname').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loadUserData();
        });
    </script>
</body>
</html>
