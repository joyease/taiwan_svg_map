<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>我去過台灣哪裡？22縣市旅遊地圖</title>
    <style>
        body { font-family: 'Microsoft JhengHei', sans-serif; text-align: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        h1 { color: #333; margin-bottom: 10px; }
        #nickname { font-size: 28px; font-weight: bold; padding: 15px; width: 400px; border: 3px solid #ddd; border-radius: 10px; text-align: center; margin: 20px; letter-spacing: 3px; background: #f9f9f9; }
        #nickname:focus { border-color: #4CAF50; outline: none; box-shadow: 0 0 15px rgba(76,175,80,0.3); }
        button { font-size: 20px; padding: 15px 30px; margin: 0 10px; border: none; border-radius: 10px; cursor: pointer; background: #4CAF50; color: white; font-weight: bold; }
        button:hover { background: #45a049; }
        #status { margin: 20px 0; font-size: 18px; font-weight: bold; min-height: 30px; }
        #map { width: 100%; height: 700px; border: 3px solid #ddd; border-radius: 15px; background: #f8f9fa; margin: 20px 0; }
        .legend { display: flex; justify-content: center; gap: 30px; margin: 30px 0; flex-wrap: wrap; font-size: 18px; font-weight: bold; }
        .legend-item { display: flex; align-items: center; gap: 12px; background: white; padding: 15px 25px; border-radius: 30px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .legend-color { width: 40px; height: 30px; border-radius: 8px; border: 3px solid #333; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🇹🇼 我去過台灣哪裡？</h1>
        <p style="color:#666; font-size:20px;">輸入暱稱查看22縣市旅遊足跡</p>
        <input type="text" id="nickname" placeholder="輸入暱稱（如：小名）">
        <br><button onclick="loadUserData()">🔍 查詢我的地圖</button>
        <div id="status">輸入暱稱查看旅遊記錄</div>
        
        <!-- 完整台灣22縣市地圖 -->
        <svg id="map" viewBox="0 0 960 1200" preserveAspectRatio="xMidYMid meet" style="width:100%;height:700px;">
            <style>
                .county { stroke: #555; stroke-width: 2; fill: #999; transition: all 0.4s; cursor: pointer; }
                .county:hover { stroke-width: 4; stroke: #000; opacity: 0.95; }
            </style>
            <path id="KEELUNG" class="county" d="M248 112L273 99L289 127L279 147L264 137Z" title="基隆市"/>
            <path id="TAIPEI" class="county" d="M289 127L320 121L336 158L316 168L289 147Z" title="臺北市"/>
            <path id="NEW_TAIPEI" class="county" d="M264 137L289 178L269 218L244 198Z" title="新北市"/>
            <path id="TAOYUAN" class="county" d="M289 178L320 188L340 218L320 228L300 208Z" title="桃園市"/>
            <path id="HSINCHU_CITY" class="county" d="M340 218L355 213L365 243L350 253Z" title="新竹市"/>
            <path id="HSINCHU_COUNTY" class="county" d="M350 253L375 263L385 293L370 283Z" title="新竹縣"/>
            <path id="MIAOLI" class="county" d="M370 283L395 293L405 333L390 323Z" title="苗栗縣"/>
            <path id="TAICHUNG" class="county" d="M390 323L420 333L440 363L425 373L405 353Z" title="臺中市"/>
            <path id="CHANGHUA" class="county" d="M425 373L450 383L470 413L455 423Z" title="彰化縣"/>
            <path id="NANTou" class="county" d="M405 353L425 393L435 433L420 423Z" title="南投縣"/>
            <path id="YUNLIN" class="county" d="M455 423L480 433L500 463L485 473Z" title="雲林縣"/>
            <path id="CHIAYI_CITY" class="county" d="M485 473L505 483L515 513L500 523Z" title="嘉義市"/>
            <path id="CHIAYI_COUNTY" class="county" d="M500 523L525 533L545 563L530 573Z" title="嘉義縣"/>
            <path id="Tainan" class="county" d="M515 513L545 523L565 553L545 563Z" title="臺南市"/>
            <path id="KAOHSIUNG" class="county" d="M545 563L575 573L595 603L580 613L560 593Z" title="高雄市"/>
            <path id="PINGTUNG" class="county" d="M580 613L610 623L630 653L615 663Z" title="屏東縣"/>
            <path id="YILAN" class="county" d="M208 112L248 127L228 137Z" title="宜蘭縣"/>
            <path id="HUALIEN" class="county" d="M355 243L385 253L400 293L380 283Z" title="花蓮縣"/>
            <path id="TAITUNG" class="county" d="M400 293L430 323L450 353L435 343Z" title="臺東縣"/>
            <path id="KINMEN" class="county" d="M720 550L740 560L750 585L735 575Z" title="金門縣"/>
            <path id="PENGHU" class="county" d="M610 610L630 620L640 640L625 630Z" title="澎湖縣"/>
            <path id="LIANCHIANG" class="county" d="M750 585L770 595L780 615L765 605Z" title="連江縣"/>
        </svg>
        
        <div class="legend">
            <div class="legend-item"><div class="legend-color" style="background:#999;"></div>0 (未去過)</div>
            <div class="legend-item"><div class="legend-color" style="background:#4CAF50;"></div>1次 (綠)</div>
            <div class="legend-item"><div class="legend-color" style="background:#FFEB3B;"></div>2次 (黃)</div>
            <div class="legend-item"><div class="legend-color" style="background:#FF9800;"></div>3次 (橘)</div>
            <div class="legend-item"><div class="legend-color" style="background:#F44336;"></div>≥4次 (紅)</div>
        </div>
    </div>

    <script>
        const counties = ['KEELUNG','TAIPEI','NEW_TAIPEI','TAOYUAN','HSINCHU_CITY','HSINCHU_COUNTY','MIAOLI','TAICHUNG','CHANGHUA','NANTou','YUNLIN','CHIAYI_CITY','CHIAYI_COUNTY','Tainan','KAOHSIUNG','PINGTUNG','YILAN','HUALIEN','TAITUNG','KINMEN','PENGHU','LIANCHIANG'];
        const colors = ['#999','#4CAF50','#FFEB3B','#FF9800','#F44336'];
        const DATA_URL = 'data.json';
        
        async function loadUserData() {
            const nickname = document.getElementById('nickname').value.trim();
            if (!nickname) {
                document.getElementById('status').innerHTML = '⚠️ 請輸入暱稱';
                return;
            }
            
            document.getElementById('status').innerHTML = '🔄 載入中...';
            
            try {
                const response = await fetch(DATA_URL);
                const data = await response.json();
                const foundSequence = data.users[nickname];
                
                if (foundSequence && foundSequence.length === 22) {
                    const visitedCount = foundSequence.split('').filter(n => n !== '0').length;
                    document.getElementById('status').innerHTML = `✅ ${nickname} 去過 ${visitedCount} 個縣市`;
                    updateMap(foundSequence);
                } else {
                    document.getElementById('status').innerHTML = `❌ 未找到 "${nickname}" 的資料<br>請確認 data.json 有此暱稱`;
                }
            } catch (error) {
                document.getElementById('status').innerHTML = '❌ 載入失敗，請確認 data.json 存在';
                console.error('錯誤:', error);
            }
        }
        
        function updateMap(seq) {
            counties.forEach((id, i) => {
                const county = document.getElementById(id);
                if (county) {
                    const visits = parseInt(seq[i]) || 0;
                    county.style.fill = colors[visits] || '#999';
                    county.title = `${getCountyName(i)}: ${visits}次`;
                }
            });
        }
        
        function getCountyName(i) {
            const names = ['基隆市','臺北市','新北市','桃園市','新竹市','新竹縣','苗栗縣','臺中市','彰化縣','南投縣','雲林縣','嘉義市','嘉義縣','臺南市','高雄市','屏東縣','宜蘭縣','花蓮縣','臺東縣','金門縣','澎湖縣','連江縣'];
            return names[i] || '未知';
        }
        
        document.getElementById('nickname').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loadUserData();
        });
        
        window.onload = () => {
            document.getElementById('status').innerHTML = '準備就緒！輸入暱稱查看旅遊足跡';
        };
    </script>
</body>
</html>
