<!DOCTYPE html>
<html>
<head>
    <title>Visited Countries Globe - GitHub Fix</title>
    <script src="https://unpkg.com/d3@7/dist/d3.min.js"></script>
    <script src="https://unpkg.com/topojson@3/dist/topojson.min.js"></script>
    <style>
        body { background: black; text-align: center; margin: 20px; font-family: Arial; }
        #worldmap svg { background: rgba(50,167,224,0.4); border-radius: 200px; box-shadow: 0 0 20px rgba(0,0,0,0.5); cursor: grab; }
        #worldmap svg:active { cursor: grabbing; }
        .ocean { fill: #0a0c10; }
        .land { fill: rgba(188,188,188,0.8); stroke: #fff; stroke-width: 0.3px; transition: fill 0.3s; }
        .visited { fill: gold; stroke: #ffed4e; stroke-width: 1px; }
        .land:hover { fill: orange; }
        #info { color: white; }
        #error { color: red; }
    </style>
</head>
<body>
    <h2>我的去過國家地球儀</h2>
    <div id="worldmap"></div>
    <p id="info">拖曳旋轉 | 黃色=去過國家 | 滑鼠hover看細節</p>
    <p id="error" style="display:none;"></p>

    <script>
        const width = 500, height = 500;
        const projection = d3.geoOrthographic()
            .scale(220)
            .translate([width / 2, height / 2])
            .rotate([0, 0])  // 初始視角
            .clipAngle(90);

        const path = d3.geoPath().projection(projection);
        const svg = d3.select("#worldmap").append("svg")
            .attr("width", width).attr("height", height)
            .call(d3.drag().on("drag", dragRotate));

        const visited = ['TW', 'JPN', 'US', 'CAN', 'KOR'];  // 加韓國示例，改你的

        // 載入地圖（unpkg CDN，GitHub Pages安全）
        d3.json("whereugo.json").then(world => {
            const land = topojson.feature(world, world.objects.countries);

            svg.append("path")
                .datum({type: "Sphere"})
                .attr("class", "ocean")
                .attr("d", path);

            svg.selectAll(".land")
                .data(land.features)
                .enter().append("path")
                .attr("class", "land")
                .attr("d", path)
                .style("fill", d => visited.includes(d.properties.iso_a3) ? "gold" : "rgba(188,188,188,0.8)")
                .style("stroke", "#fff")
                .style("stroke-width", d => visited.includes(d.properties.iso_a3) ? "1px" : "0.3px")
                .on("mouseover", (event, d) => {
                    d3.select("#info").text(`國家: ${d.properties.name} (ISO: ${d.properties.iso_a3})`);
                })
                .on("mouseout", () => d3.select("#info").text("拖曳旋轉 | 黃色=去過國家"));

            // 自動旋轉（選用）
            // d3.timer(() => { projection.rotate([Date.now() * 0.005 % 360, 0]); svg.selectAll("path").attr("d", path); });
        }).catch(err => {
            document.getElementById("error").textContent = "載入失敗: " + err + " (檢查網路或CDN)";
            document.getElementById("error").style.display = "block";
        });

        function dragRotate(event) {
            const rotate = projection.rotate();
            const dx = event.dx / 2;
            const dy = -event.dy / 2;
            projection.rotate([rotate[0] + dx, Math.max(-90, Math.min(90, rotate[1] + dy))]);
            svg.selectAll("path").attr("d", path);
        }
    </script>
</body>
</html>
