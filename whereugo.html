<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣22縣市互動地圖</title>
    <style>
        body { 
            font-family: 'Microsoft JhengHei', sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px; margin: 0;
        }
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .header { background: linear-gradient(90deg, #ff6b6b, #feca57); color: white; text-align: center; padding: 30px; }
        .main-content { display: grid; grid-template-columns: 1fr 350px; gap: 30px; padding: 30px; }
        #taiwan-map { width: 100%; height: 700px; cursor: pointer; background: #f8f9fa; }
        .sidebar { background: white; padding: 25px; border-radius: 15px; }
        .county-item { padding: 12px; margin: 5px 0; background: #f8f9fa; cursor: pointer; border-radius: 10px; }
        .county-item.visited { background: linear-gradient(90deg, #4facfe, #00f2fe); color: white; }
        .tooltip { position: fixed; background: rgba(0,0,0,0.9); color: white; padding: 10px; border-radius: 8px; pointer-events: none; z-index: 1000; opacity: 0; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>點亮台灣22縣市</h1>
            <div style="display:flex; justify-content:center; gap:30px; margin-top:20px;">
                <div><strong id="visited-count">0</strong>/22 已走訪</div>
                <div><strong id="percent">0%</strong> 完成率</div>
            </div>
        </div>
        
        <div class="main-content">
            <div style="background:white; border-radius:15px; padding:20px;">
                <svg id="taiwan-map" viewBox="0 0 1440 2055" xmlns="http://www.w3.org/2000/svg">
                    <g id="county-group" fill="#ddd" stroke="#333" stroke-width="1"></g>
                </svg>
            </div>
            
            <div class="sidebar">
                <h3>🏞️ 我的足跡</h3>
                <div id="county-list"></div>
                <button onclick="resetAll()" style="width:100%; padding:12px; background:#ff6b6b; color:white; border:none; border-radius:25px; font-weight:bold; cursor:pointer; margin-top:20px;">🔄 重置</button>
            </div>
        </div>
    </div>

    <div class="tooltip" id="tooltip"></div>

    <script>
        let countiesData = [];
        let visitedCounties = new Set();
        
        // 🔥 載入JSON並渲染地圖
        async function loadMap() {
            try {
                const response = await fetch('taiwan_counties.json');
                countiesData = await response.json().counties;
                
                renderMap();
                renderCountyList();
                bindMapEvents();
                
                document.getElementById('visited-count').textContent = '0';
                console.log(`✅ 載入 ${countiesData.length} 個縣市`);
            } catch(e) {
                alert('請確認 taiwan_counties.json 在同資料夾');
            }
        }
        
        // 渲染地圖path
        function renderMap() {
            const group = document.getElementById('county-group');
            countiesData.forEach((county, index) => {
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.id = county.id;
                path.title = county.title;
                path.setAttribute('d', county.path);
                path.setAttribute('fill', '#ddd');
                path.dataset.index = index;
                group.appendChild(path);
            });
        }
        
        // 渲染縣市清單
        function renderCountyList() {
            const list = document.getElementById('county-list');
            countiesData.forEach((county, index) => {
                const div = document.createElement('div');
                div.className = 'county-item';
                div.dataset.index = index;
                div.innerHTML = `<input type="checkbox" style="margin-right:10px; transform:scale(1.2);"> ${county.title}`;
                div.addEventListener('click', (e) => {
                    if(e.target.tagName !== 'INPUT') {
                        const cb = div.querySelector('input');
                        cb.checked = !cb.checked;
                        toggleCounty(index, cb.checked);
                    }
                });
                list.appendChild(div);
            });
        }
        
        // 綁定地圖事件
        function bindMapEvents() {
            const svg = document.getElementById('taiwan-map');
            const tooltip = document.getElementById('tooltip');
            
            svg.addEventListener('mousemove', (e) => {
                const path = e.target.closest('path');
                if(path && path.title) {
                    tooltip.textContent = path.title;
                    tooltip.style.opacity = '1';
                    tooltip.style.left = (e.pageX + 10) + 'px';
                    tooltip.style.top = (e.pageY - 10) + 'px';
                }
            });
            
            svg.addEventListener('mouseleave', () => {
                tooltip.style.opacity = '0';
            });
            
            svg.addEventListener('click', (e) => {
                const path = e.target.closest('path');
                if(path) {
                    const index = parseInt(path.dataset.index);
                    const isVisited = visitedCounties.has(index);
                    toggleCounty(index, !isVisited);
                }
            });
        }
        
        // 切換縣市狀態
        function toggleCounty(index, visited) {
            if(visited) {
                visitedCounties.add(index);
                document.querySelector(`path[data-index="${index}"]`).setAttribute('fill', '#4facfe');
                document.querySelectorAll(`[data-index="${index}"]`)[1].classList.add('visited');
            } else {
                visitedCounties.delete(index);
                document.querySelector(`path[data-index="${index}"]`).setAttribute('fill', '#ddd');
                document.querySelectorAll(`[data-index="${index}"]`)[1].classList.remove('visited');
            }
            updateStats();
        }
        
        // 更新統計
        function updateStats() {
            const count = visitedCounties.size;
            const percent = Math.round((count / countiesData.length) * 100);
            document.getElementById('visited-count').textContent = count;
            document.getElementById('percent').textContent = percent + '%';
        }
        
        // 重置
        function resetAll() {
            visitedCounties.clear();
            countiesData.forEach((_, index) => toggleCounty(index, false));
            updateStats();
        }
        
        // 啟動
        loadMap();
    </script>
</body>
</html>
