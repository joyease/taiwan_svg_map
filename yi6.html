<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>赫學堂｜思想與科技的交會點</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;900&family=Noto+Sans+TC:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;}

:root{
 --ink:#1c1c2e;
 --paper:#f6f1e8;
 --muted:#7a746d;

 --c1:#e76f51;
 --c2:#457b9d;
 --c3:#2a9d8f;
}

body{
 font-family:'Noto Sans TC',sans-serif;
 background:var(--paper);
 color:var(--ink);
}

/* HERO - 縮小上下內距 */
.hero{
 text-align:center;
 padding:60px 20px 40px; 
 background:linear-gradient(to bottom,#fdfaf4,#f6f1e8);
}

.hero-title{
 font-family:'Noto Serif TC',serif;
 font-size:56px;
 font-weight:900;
 letter-spacing:6px;
}

.hero-sub{
 margin-top:12px;
 color:#a65a2a;
 font-size:14px;
 letter-spacing:.2em;
}

.hero-desc{
 margin-top:15px;
 font-size:15px;
 color:var(--muted);
 line-height:1.8;
}

/* 三大主軸 - 縮小上下邊距 */
.feature{
 max-width:1100px;
 margin:20px auto; 
 display:grid;
 grid-template-columns:repeat(3,1fr);
 gap:20px;
 padding: 0 20px;
}

@media(max-width:768px){
 .feature{grid-template-columns:1fr;}
}

.feature-card{
 padding:25px;
 border-radius:16px;
 background:white;
 transition:.3s;
}

.feature-card:hover{
 transform:translateY(-8px);
 box-shadow:0 15px 40px rgba(0,0,0,0.08);
}

.f1{border-top:5px solid var(--c1);}
.f2{border-top:5px solid var(--c2);}
.f3{border-top:5px solid var(--c3);}

.feature-title{
 font-family:'Noto Serif TC',serif;
 font-size:26px;
 font-weight:900;
 margin-bottom:10px;
}

.feature-desc{
 font-size:14px;
 color:var(--muted);
 line-height:1.8;
}

/* 子分類 */
.feature-links{
 margin-top:16px;
 display:flex;
 flex-wrap:wrap;
 gap:8px;
}

.feature-links a{
 font-size:12px;
 padding:6px 10px;
 border-radius:20px;
 background:#f1ece4;
 text-decoration:none;
 color:#333;
 transition:.2s;
}

.feature-links a:hover{
 background:#000;
 color:#fff;
 transform:translateY(-2px);
}

/* 精選內容 - 縮小上方間距 */
.section-title{
 text-align:center;
 margin-top:40px; 
 font-family:'Noto Serif TC',serif;
 font-size:28px;
}

.grid{
 max-width:1100px;
 margin:30px auto; 
 display:grid;
 grid-template-columns:repeat(3,1fr);
 gap:20px;
 padding: 0 20px;
}

@media(max-width:768px){
 .grid{grid-template-columns:1fr;}
}

.card{
 background:white;
 padding:25px;
 border-radius:16px;
 transition:.25s;
 text-decoration:none;
 color:inherit;
 display:flex;
 flex-direction:column;
}

.card:hover{
 transform:translateY(-6px);
 box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.card-title{
 font-family:'Noto Serif TC',serif;
 font-size:22px;
 font-weight:900;
 margin-bottom:10px;
}

.card-desc{
 font-size:13px;
 color:var(--muted);
 line-height:1.7;
}

.tag{
 display:inline-block;
 margin-top:10px;
 font-size:11px;
 padding:4px 10px;
 border-radius:20px;
 background:#f1ece4;
}

/* PODCAST */
.podcast{
 text-align:center;
 margin:30px 0;
}

.podcast a{
 display:inline-block;
 margin-top:10px;
 padding:10px 20px;
 border-radius:30px;
 background:black;
 color:white;
 text-decoration:none;
}

/* FOOTER - 縮小上方間距 */
.footer{
 text-align:center;
 margin:50px 0 60px; 
 font-size:13px;
 color:#6b645c;
 line-height:1.8;
}
</style>
</head>
